<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Score Sense</title>
    <link rel="stylesheet" href="index.css">
    <link rel="icon" href="gb.png" type="image/x-icon">
    <link href='https://fonts.googleapis.com/css?family=Alexandria' rel='stylesheet'>

  </head>
  <body>
    <main>
      <h1>Score Sense</h1>

      <div class="home_game">
        <h2> 40 </h2>
      </div>

      <div class="visitor_game">
        <h2> 30 </h2>
      </div>

      <div class="game_border2"></div>
      <div class="game_border"></div>
      
      <!-- <input type="image" src="pink microphone.png" width="250px" height="250px" class="center"> -->

      <div class="set_score"></div>

      <div class="home_set"></div>
      <div class="visitor_set"></div>

      <div class="set_border2"></div>
      <div class="set_border"></div>
      
      <img src="gb.png" alt="logo" class="logo">
      
      <button class="home_winner_button"></button>
      <div class="hide">
        <div class="home_winner_hover"></div>
      </div>
      
      <button class="visitor_winner_button"></button>
      <div class="hide">
        <div class="visitor_winner_hover"></div>
      </div>

    </main>
    <script src="index.js"></script>
  </body>
</html>
